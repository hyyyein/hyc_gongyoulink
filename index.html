<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>링크 보관함</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
  }

  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: #fff;
  }

  .controls {
    padding: 20px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 9px 14px;
    color: #e8e8e8;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: #555; }
  .search-wrap input::placeholder { color: #555; }

  .tag-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag-btn:hover { border-color: #555; color: #ccc; }
  .tag-btn.active { background: #fff; color: #000; border-color: #fff; }

  .sort-select {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 9px 14px;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  .add-btn {
    padding: 9px 18px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .add-btn:hover { opacity: 0.85; }

  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 28px;
    width: 440px;
    max-width: 90vw;
  }

  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

  .modal label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .modal label:first-of-type { margin-top: 0; }

  .modal input[type="text"],
  .modal input[type="url"] {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e8e8e8;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .modal input:focus { border-color: #555; }

  .modal-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .modal-tag {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .modal-tag.selected { background: #fff; color: #000; border-color: #fff; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 22px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 9px 16px;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #888;
    font-size: 14px;
    cursor: pointer;
  }

  .btn-save {
    padding: 9px 18px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  .grid {
    padding: 24px 40px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }

  .card:hover { border-color: #3a3a3a; transform: translateY(-2px); }

  .card-thumb {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: #111;
    display: block;
  }

  .card-thumb-placeholder {
    width: 100%;
    height: 160px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .card-body { padding: 14px; }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: #e8e8e8;
    margin-bottom: 6px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-url {
    font-size: 12px;
    color: #555;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 12px;
    color: #666;
    line-height: 1.4;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .card-tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: #222;
    color: #aaa;
  }

  .card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .card:hover .card-actions { opacity: 1; }

  .card-actions button {
    background: #2a2a2a;
    border: none;
    border-radius: 6px;
    color: #888;
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .card-actions button:hover { background: #3a3a3a; color: #fff; }
  .card-actions .del-btn:hover { background: #3d1a1a; color: #ff6b6b; }

  .card-link {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .card-actions, .card-actions button {
    position: relative;
    z-index: 2;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: #444;
    font-size: 14px;
  }

  #status {
    text-align: center;
    padding: 60px;
    color: #555;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>링크 보관함 by hyeincho</h1>
  <button class="add-btn" onclick="openModal()">+ 링크 추가</button>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="제목, URL 검색...">
  </div>
  <div class="tag-filters">
    <button class="tag-btn active" data-tag="전체">전체</button>
    <button class="tag-btn" data-tag="AI">AI</button>
    <button class="tag-btn" data-tag="포토샵">포토샵</button>
    <button class="tag-btn" data-tag="영상">영상</button>
    <button class="tag-btn" data-tag="이미지">이미지</button>
    <button class="tag-btn" data-tag="아이디어">아이디어</button>
    <button class="tag-btn" data-tag="바이브코딩">바이브코딩</button>
    <button class="tag-btn" data-tag="클로드코드">클로드코드</button>
    <button class="tag-btn" data-tag="ComfyUI">ComfyUI</button>
    <button class="tag-btn" data-tag="NAI">NAI</button>
    <button class="tag-btn" data-tag="NanoBanana">NanoBanana</button>
    <button class="tag-btn" data-tag="클립스튜디오">클립스튜디오</button>
    <button class="tag-btn" data-tag="개발">개발</button>
    <button class="tag-btn" data-tag="기타">기타</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="desc">최신순</option>
    <option value="asc">오래된순</option>
  </select>
</div>

<div id="status">Firebase 연결 중...</div>
<div class="grid" id="grid" style="display:none"></div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="handleBgClick(event)">
  <div class="modal">
    <h2 id="modalTitle">링크 추가</h2>
    <label>URL</label>
    <input type="url" id="urlInput" placeholder="https://..." oninput="onUrlChange()">
    <label>제목 <span style="color:#555;font-size:11px">(자동 입력됨, 수정 가능)</span></label>
    <input type="text" id="titleInput" placeholder="제목">
    <label>상세설명 <span style="color:#555;font-size:11px">(선택)</span></label>
    <input type="text" id="descInput" placeholder="짧은 메모...">
    <label>태그</label>
    <div class="modal-tags">
      <button class="modal-tag" data-tag="AI">AI</button>
      <button class="modal-tag" data-tag="포토샵">포토샵</button>
      <button class="modal-tag" data-tag="영상">영상</button>
      <button class="modal-tag" data-tag="이미지">이미지</button>
      <button class="modal-tag" data-tag="아이디어">아이디어</button>
      <button class="modal-tag" data-tag="바이브코딩">바이브코딩</button>
      <button class="modal-tag" data-tag="클로드코드">클로드코드</button>
      <button class="modal-tag" data-tag="ComfyUI">ComfyUI</button>
      <button class="modal-tag" data-tag="NAI">NAI</button>
      <button class="modal-tag" data-tag="NanoBanana">NanoBanana</button>
      <button class="modal-tag" data-tag="클립스튜디오">클립스튜디오</button>
      <button class="modal-tag" data-tag="개발">개발</button>
      <button class="modal-tag" data-tag="기타">기타</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="saveBtn" onclick="saveLink()">저장</button>
    </div>
  </div>
</div>

<!-- ✅ 여기에 Firebase config를 붙여넣으세요 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, orderBy, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAPs7d59vZFkw2RSLUesnudcrZnNhxEdg",
    authDomain: "sharelink-54e34.firebaseapp.com",
    projectId: "sharelink-54e34",
    storageBucket: "sharelink-54e34.firebasestorage.app",
    messagingSenderId: "694782332637",
    appId: "1:694782332637:web:c4bbacb2b0fe34509e1534"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "links");

  let links = [];
  let selectedTags = new Set();
  let selectedModalTags = new Set();
  let fetchTimer = null;
  let editId = null;
  let pendingMeta = {};

  // 실시간 동기화
  const q = query(colRef, orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    links = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('status').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    render();
  }, (err) => {
    document.getElementById('status').textContent = 'Firebase 연결 실패. config를 확인해주세요.';
    console.error(err);
  });

  function getDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); } catch { return url; }
  }

  function getSiteEmoji(url) {
    const d = getDomain(url);
    if (d.includes('youtube') || d.includes('youtu.be')) return '▶️';
    if (d.includes('instagram')) return '📸';
    if (d.includes('notion')) return '📄';
    if (d.includes('twitter') || d.includes('x.com')) return '𝕏';
    if (d.includes('github')) return '🐙';
    if (d.includes('figma')) return '🎨';
    return '🔗';
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const grid = document.getElementById('grid');
    const sortOrder = document.getElementById('sortSelect').value;
    const sorted = [...links].sort((a, b) => sortOrder === 'asc' ? a.createdAt - b.createdAt : b.createdAt - a.createdAt);

    let filtered = sorted.filter(l => {
      const linkTags = Array.isArray(l.tags) ? l.tags : (l.tag ? [l.tag] : []);
      const matchTag = selectedTags.size === 0 || linkTags.some(t => selectedTags.has(t));
      const matchQ = !q || (l.title||'').toLowerCase().includes(q) || (l.url||'').toLowerCase().includes(q);
      return matchTag && matchQ;
    });

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty">링크가 없어요. 추가해보세요!</div>';
      return;
    }

    grid.innerHTML = filtered.map(l => {
      const thumb = l.image
        ? `<img class="card-thumb" src="${escHtml(l.image)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
           <div class="card-thumb-placeholder" style="display:none">${getSiteEmoji(l.url)}</div>`
        : `<div class="card-thumb-placeholder">${getSiteEmoji(l.url)}</div>`;

      return `
      <div class="card">
        <a class="card-link" href="${escHtml(l.url)}" target="_blank" rel="noopener"></a>
        ${thumb}
        <div class="card-body">
          <div class="card-title">${escHtml(l.title || getDomain(l.url))}</div>
          <div class="card-url">${escHtml(getDomain(l.url))}</div>
          ${l.desc ? `<div class="card-desc">${escHtml(l.desc)}</div>` : ''}
          <div class="card-footer">
            <div class="card-tags">${(Array.isArray(l.tags) ? l.tags : (l.tag ? [l.tag] : ['기타'])).map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('')}</div>
            <div class="card-actions">
              <button onclick="window._editLink('${l.id}')">수정</button>
              <button class="del-btn" onclick="window._deleteLink('${l.id}')">삭제</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tag === '전체') {
        selectedTags.clear();
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      } else {
        document.querySelector('.tag-btn[data-tag="전체"]').classList.remove('active');
        if (selectedTags.has(btn.dataset.tag)) {
          selectedTags.delete(btn.dataset.tag);
          btn.classList.remove('active');
        } else {
          selectedTags.add(btn.dataset.tag);
          btn.classList.add('active');
        }
        if (selectedTags.size === 0) {
          document.querySelector('.tag-btn[data-tag="전체"]').classList.add('active');
        }
      }
      render();
    });
  });

  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('sortSelect').addEventListener('change', render);

  document.querySelectorAll('.modal-tag').forEach(btn => {
    btn.addEventListener('click', () => {
      if (selectedModalTags.has(btn.dataset.tag)) {
        selectedModalTags.delete(btn.dataset.tag);
        btn.classList.remove('selected');
      } else {
        selectedModalTags.add(btn.dataset.tag);
        btn.classList.add('selected');
      }
    });
  });

  window.openModal = function(id) {
    editId = id || null;
    pendingMeta = {};
    document.getElementById('modalTitle').textContent = id ? '링크 수정' : '링크 추가';
    document.getElementById('modalBg').classList.add('open');

    if (id) {
      const l = links.find(x => x.id === id);
      document.getElementById('urlInput').value = l.url;
      document.getElementById('titleInput').value = l.title;
      document.getElementById('descInput').value = l.desc || '';
      const existingTags = Array.isArray(l.tags) ? l.tags : (l.tag ? [l.tag] : []);
      selectedModalTags = new Set(existingTags);
      pendingMeta = { image: l.image };
    } else {
      document.getElementById('urlInput').value = '';
      document.getElementById('titleInput').value = '';
      document.getElementById('descInput').value = '';
      selectedModalTags = new Set();
    }

    document.querySelectorAll('.modal-tag').forEach(b => {
      b.classList.toggle('selected', selectedModalTags.has(b.dataset.tag));
    });
  };

  window.closeModal = function() {
    document.getElementById('modalBg').classList.remove('open');
    clearTimeout(fetchTimer);
  };

  let mousedownTarget = null;
  document.getElementById('modalBg').addEventListener('mousedown', e => { mousedownTarget = e.target; });

  window.handleBgClick = function(e) {
    if (e.target === document.getElementById('modalBg') && mousedownTarget === document.getElementById('modalBg')) {
      window.closeModal();
    }
  };

  window.onUrlChange = function() {
    clearTimeout(fetchTimer);
    const url = document.getElementById('urlInput').value.trim();
    if (!url || !url.startsWith('http')) return;
    fetchTimer = setTimeout(() => fetchMeta(url), 800);
  };

  async function fetchMeta(url) {
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = '불러오는 중...';
    saveBtn.disabled = true;
    try {
      const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      if (data.status === 'success') {
        pendingMeta = {
          title: data.data.title || '',
          image: data.data.image?.url || data.data.screenshot?.url || ''
        };
        const titleInput = document.getElementById('titleInput');
        if (!titleInput.value) titleInput.value = pendingMeta.title;
      }
    } catch(e) {}
    saveBtn.textContent = '저장';
    saveBtn.disabled = false;
  }

  window.saveLink = async function() {
    const url = document.getElementById('urlInput').value.trim();
    const title = document.getElementById('titleInput').value.trim() || getDomain(url);
    const desc = document.getElementById('descInput').value.trim();
    if (!url) return;

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    try {
      const tags = [...selectedModalTags];
      if (editId) {
        await updateDoc(doc(db, "links", editId), { url, title, desc, tags, image: pendingMeta.image || '' });
      } else {
        await addDoc(colRef, { url, title, desc, tags, image: pendingMeta.image || '', createdAt: Date.now() });
      }
      window.closeModal();
    } catch(e) {
      alert('저장 실패: ' + e.message);
    }

    saveBtn.disabled = false;
    saveBtn.textContent = '저장';
  };

  window._editLink = function(id) { window.openModal(id); };

  window._deleteLink = async function(id) {
    if (!confirm('삭제할까요?')) return;
    await deleteDoc(doc(db, "links", id));
  };
</script>
</body>
</html>
