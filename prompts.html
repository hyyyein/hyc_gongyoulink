<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 갤러리 ✦ hyc</title>
<style>
  :root {
    --sky: #5599cc;
    --sky-light: #88bbdd;
    --sky-pale: #ddeeff;
    --bg: #b8d4ec;
    --card-bg: #ffffff;
    --border: #aaccee;
    --border-dark: #7aabcc;
    --text: #333333;
    --muted: #778899;
    --pink: #ee88aa;
    --pink-deep: #cc4477;
    --pink-pale: #fff0f6;
    --pink-border: #f0b8d0;
    --header-bg: linear-gradient(180deg, #f090b0 0%, #f8c8d8 60%, #f0f8ff 100%);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes sparkle {
    0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
    25% { opacity: 0.4; transform: scale(1.3) rotate(15deg); }
    75% { opacity: 0.7; transform: scale(0.8) rotate(-10deg); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes shine {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  body {
    font-family: '굴림', 'Gulim', '돋움', 'Dotum', AppleGothic, sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px),
      linear-gradient(180deg, #c8dff4 0%, #b8d4ec 100%);
    background-size: 18px 18px, 100% 100%;
    font-size: 12px;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--header-bg);
    padding: 12px 20px;
    border-bottom: 3px solid #d070a0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    box-shadow: 0 2px 8px rgba(220,100,150,0.25);
    flex-wrap: wrap;
    gap: 6px;
  }
  .header-top {
    display: contents;
  }
  header h1 {
    font-size: 16px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 1px 1px 0 rgba(180,60,90,0.5), 0 0 12px rgba(255,255,255,0.6);
    letter-spacing: 1px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  header h1 .spark {
    font-size: 14px;
    animation: sparkle 1.8s ease-in-out infinite;
    display: inline-block;
  }
  header h1 .spark:nth-child(3) { animation-delay: 0.6s; }

  .header-tagline {
    font-family: '궁서체', '궁서', GungSeo, serif;
    font-size: 18px;
    color: #8b0018;
    text-shadow: 1px 1px 0 rgba(255,200,200,0.6);
    animation: float 3s ease-in-out infinite;
  }
  .header-btn {
    padding: 5px 14px;
    background: linear-gradient(180deg, #ee9aaa 0%, #cc4466 100%);
    color: #fff;
    border-top: 2px solid #ffccdd;
    border-left: 2px solid #ffccdd;
    border-right: 2px solid #882244;
    border-bottom: 2px solid #882244;
    border-radius: 0;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
    transition: filter 0.1s;
  }
  .header-btn:hover { filter: brightness(1.1); }
  .header-btn:active {
    border-top: 2px solid #882244;
    border-left: 2px solid #882244;
    border-right: 2px solid #ffccdd;
    border-bottom: 2px solid #ffccdd;
  }

  /* ===== PAGE NAV ===== */
  .page-nav {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    padding: 12px 20px 0;
    background: linear-gradient(180deg, #f0f8ff 0%, #e4f0fc 100%);
    border-top: 2px solid #b0d8f0;
  }
  .page-nav-tab {
    padding: 5px 16px;
    font-family: '굴림', sans-serif;
    font-size: 11px;
    font-weight: bold;
    color: #336699;
    background: #ddeeff;
    border-top: 2px solid #e0eeff;
    border-left: 2px solid #e0eeff;
    border-right: 2px solid #7aabcc;
    border-bottom: none;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: background 0.05s;
    border-radius: 3px 3px 0 0;
  }
  .page-nav-tab:hover { background: #cce0f8; }
  .page-nav-tab.active {
    background: var(--sky);
    color: #fff;
    border-top: 2px solid #4488bb;
    border-left: 2px solid #4488bb;
    border-right: 2px solid #88ccee;
    z-index: 2;
  }

  /* ===== CONTROLS ===== */
  .controls {
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    background: linear-gradient(180deg, #e4f0fc 0%, #d8ecf8 100%);
    border-bottom: 2px solid #b0d8f0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .search-wrap {
    flex: 1;
    min-width: 160px;
    max-width: 360px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: #ffffff;
    border: 2px inset #aaccee;
    border-radius: 0;
    padding: 4px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    font-family: inherit;
    box-shadow: inset 1px 1px 3px rgba(100,150,200,0.2);
  }
  .search-wrap input::placeholder { color: #aabbcc; }
  .search-wrap input:focus { border-color: var(--sky); }

  .env-filters {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex: 1;
  }
  .env-btn {
    padding: 3px 9px;
    border-radius: 0;
    border-top: 2px solid #e0eeff;
    border-left: 2px solid #e0eeff;
    border-right: 2px solid #7aabcc;
    border-bottom: 2px solid #7aabcc;
    background: #ddeeff;
    color: #336699;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.05s;
    font-weight: bold;
  }
  .env-btn:hover { background: #cce0f8; }
  .env-btn:active {
    border-top: 2px solid #7aabcc;
    border-left: 2px solid #7aabcc;
    border-right: 2px solid #e0eeff;
    border-bottom: 2px solid #e0eeff;
  }
  .env-btn.active {
    background: var(--sky);
    color: #fff;
    border-top: 2px solid #4488bb;
    border-left: 2px solid #4488bb;
    border-right: 2px solid #88ccee;
    border-bottom: 2px solid #88ccee;
  }

  .sort-select {
    background: #ddeeff;
    border-top: 2px solid #e0eeff;
    border-left: 2px solid #e0eeff;
    border-right: 2px solid #7aabcc;
    border-bottom: 2px solid #7aabcc;
    border-radius: 0;
    padding: 4px 10px;
    color: #336699;
    font-size: 11px;
    cursor: pointer;
    outline: none;
    font-family: inherit;
    font-weight: bold;
  }

  /* ===== PINNED RIBBON ===== */
  .pinned-ribbon {
    margin: 10px 20px 0;
    padding: 10px 14px;
    background: linear-gradient(180deg, #fff0f6 0%, #ffe8f2 100%);
    border: 1px solid var(--pink-border);
    border-radius: 3px;
    box-shadow: 2px 2px 0 rgba(200,100,150,0.15);
    display: none;
  }
  .pinned-ribbon.show { display: block; }
  .pinned-title {
    font-size: 12px;
    font-weight: bold;
    color: var(--pink-deep);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .pinned-title .spark {
    animation: sparkle 1.8s ease-in-out infinite;
    display: inline-block;
  }
  .pinned-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .pinned-scroll::-webkit-scrollbar { height: 4px; }
  .pinned-scroll::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 2px; }
  .pinned-item {
    flex: 0 0 110px;
    height: 110px;
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 2px solid var(--pink-border);
    background: var(--pink-pale);
    transition: transform 0.15s, border-color 0.15s;
    box-shadow: 2px 2px 0 rgba(200,100,150,0.2);
  }
  .pinned-item:hover { transform: translate(-1px,-1px); border-color: var(--pink); }
  .pinned-item img { width: 100%; height: 100%; object-fit: cover; }
  .pinned-item .pin-overlay {
    position: absolute;
    top: 4px; left: 4px;
    background: var(--pink-deep);
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 0;
  }
  .pinned-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, var(--sky-pale), #e4f0fc);
    font-size: 30px;
  }

  /* ===== MASONRY GRID ===== */
  .masonry {
    padding: 16px 20px 60px;
    column-count: 4;
    column-gap: 12px;
  }
  @media (max-width: 1200px) { .masonry { column-count: 3; } }
  @media (max-width: 800px) { .masonry { column-count: 2; padding: 12px 12px 50px; } }
  @media (max-width: 480px) { .masonry { column-count: 2; column-gap: 6px; padding: 10px 8px 50px; } }

  .pcard {
    break-inside: avoid;
    margin-bottom: 12px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    animation: fadeIn 0.4s ease-out backwards;
    box-shadow: 2px 2px 0 #aabbcc, 3px 3px 0 rgba(100,150,200,0.3);
  }
  .pcard:hover {
    border-color: #99ccee;
    box-shadow: 3px 3px 0 #88aacc, 4px 4px 12px rgba(85,153,204,0.25);
    transform: translate(-1px, -1px);
  }
  .pcard-img-wrap {
    position: relative;
    background: var(--sky-pale);
    overflow: hidden;
  }
  .pcard-img {
    width: 100%;
    display: block;
  }
  .pcard-placeholder {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, var(--sky-pale), #e8f4fc);
    font-size: 38px;
    color: var(--sky);
    gap: 6px;
  }
  .pcard-placeholder-label {
    font-size: 11px;
    color: var(--sky);
    font-weight: bold;
    letter-spacing: 1px;
  }

  .pcard-pin {
    position: absolute;
    top: 7px; left: 7px;
    background: linear-gradient(135deg, #ff4488 0%, #ff88bb 50%, #ff4488 100%);
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    padding: 2px 7px;
    border-radius: 8px 8px 8px 2px;
    z-index: 3;
    box-shadow: 1px 2px 4px rgba(200,50,100,0.3);
  }
  .pcard-new {
    position: absolute;
    top: 7px; right: 7px;
    background: linear-gradient(135deg, #ff4488 0%, #ff88bb 50%, #ff4488 100%);
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 8px 8px 8px 2px;
    z-index: 3;
    box-shadow: 1px 2px 4px rgba(200,50,100,0.3);
  }
  .pcard-img-count {
    position: absolute;
    bottom: 6px; right: 6px;
    background: rgba(85,153,204,0.85);
    color: #fff;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 0;
    font-weight: bold;
  }
  .pcard-img-count::before { content: "▣ "; }

  /* hover overlay with prompt preview */
  .pcard-hover {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 30%, rgba(34,68,136,0.82) 100%);
    color: #fff;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .pcard:hover .pcard-hover { opacity: 1; }
  .pcard-hover-title {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .pcard-hover-env {
    font-size: 10px;
    color: var(--sky-pale);
    margin-bottom: 3px;
  }
  .pcard-hover-meta {
    font-size: 10px;
    color: rgba(255,255,255,0.8);
    display: flex;
    gap: 8px;
  }

  /* cards without images - text only */
  .pcard-text-only {
    padding: 12px 12px 10px;
  }
  .pcard-text-only .pcard-text-title {
    font-size: 12px;
    font-weight: bold;
    color: #225588;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .pcard-text-only .pcard-text-env {
    font-size: 10px;
    color: var(--sky);
    margin-bottom: 6px;
    font-weight: bold;
  }
  .pcard-text-only .pcard-text-preview {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    background: var(--sky-pale);
    padding: 7px 9px;
    border-radius: 0;
    font-family: 'Courier New', 'D2Coding', monospace;
    border-left: 3px solid var(--sky);
  }
  .pcard-text-only .pcard-text-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 7px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .pcard-text-only .pcard-text-meta .author { color: var(--sky); font-weight: bold; }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: #aabbcc;
    font-size: 13px;
  }
  .status {
    text-align: center;
    padding: 60px 20px;
    color: #aabbcc;
    font-size: 13px;
  }

  /* ===== DETAIL MODAL ===== */
  .detail-bg {
    position: fixed;
    inset: 0;
    background: rgba(100,150,200,0.55);
    z-index: 1000;
    display: none;
    overflow-y: auto;
    padding: 20px;
  }
  .detail-bg.open { display: block; }
  .detail-modal {
    max-width: 1000px;
    margin: 20px auto;
    background: #f0f8ff;
    border: 2px solid var(--border-dark);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.12);
    animation: fadeIn 0.2s ease-out;
  }
  .detail-close {
    position: absolute;
    top: 10px; right: 10px;
    width: 24px; height: 24px;
    background: #ddeeff;
    border: 1px solid var(--border-dark);
    border-radius: 3px;
    color: var(--sky);
    font-size: 12px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    transition: background 0.1s;
  }
  .detail-close:hover { background: var(--sky); color: #fff; }

  /* Image section - BIG */
  .detail-hero {
    background: var(--sky-pale);
    padding: 0;
    position: relative;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .detail-hero-img {
    max-width: 100%;
    max-height: 80vh;
    display: block;
    object-fit: contain;
  }
  .detail-hero-placeholder {
    padding: 60px 20px;
    font-size: 60px;
    opacity: 0.5;
  }
  .detail-hero-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .carousel-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--border-dark);
    border-radius: 3px;
    color: var(--sky);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    transition: background 0.1s;
  }
  .carousel-nav:hover { background: var(--sky); color: #fff; }
  .carousel-nav.prev { left: 10px; }
  .carousel-nav.next { right: 10px; }
  .carousel-thumbs {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    background: #e4f0fc;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
  }
  .carousel-thumb {
    flex: 0 0 54px;
    height: 54px;
    border-radius: 0;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid var(--border);
    opacity: 0.6;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .carousel-thumb.active { opacity: 1; border-color: var(--sky); }
  .carousel-thumb:hover { opacity: 1; }
  .carousel-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* Info section */
  .detail-info {
    padding: 18px 24px 10px;
    background: #ffffff;
  }
  .detail-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .detail-tag {
    font-size: 10px;
    font-weight: bold;
    padding: 2px 9px;
    background: var(--sky-pale);
    color: var(--sky);
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .detail-title {
    font-size: 18px;
    font-weight: bold;
    color: #224488;
    margin-bottom: 8px;
    line-height: 1.4;
    word-break: break-word;
  }
  .detail-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--border);
  }
  .detail-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .detail-stats {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-top: 1px dashed var(--border);
    border-bottom: 1px dashed var(--border);
    margin-bottom: 0;
  }
  .like-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #bb5577;
    background: linear-gradient(180deg, #fff5f8 0%, #ffe8f0 100%);
    border-top: 2px solid #ffddee;
    border-left: 2px solid #ffddee;
    border-right: 2px solid #cc7799;
    border-bottom: 2px solid #cc7799;
    border-radius: 0;
    padding: 4px 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    transition: filter 0.1s;
  }
  .like-btn:hover { filter: brightness(0.95); }
  .like-btn.liked { background: linear-gradient(180deg, #ffe0ea 0%, #ffccd8 100%); color: #cc4466; }
  .stat-item { color: var(--muted); font-size: 11px; display: flex; align-items: center; gap: 4px; }

  /* Prompt body sections */
  .detail-body {
    padding: 0 24px 20px;
    background: #ffffff;
    border-top: 1px solid var(--border);
  }
  .psection {
    margin-top: 16px;
  }
  .psection-title {
    font-size: 11px;
    color: var(--sky);
    font-weight: bold;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px dotted var(--border);
    padding-bottom: 4px;
  }
  .psection-title::before {
    content: "✦";
    margin-right: 5px;
    opacity: 0.5;
    font-size: 9px;
  }
  .psection-content {
    background: #f8fcff;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    color: #444;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .psection.prompt-main .psection-content {
    background: var(--sky-pale);
    border-color: var(--border-dark);
    font-family: 'Courier New', 'D2Coding', monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 12px 14px;
    border-left: 3px solid var(--sky);
  }
  .copy-btn {
    background: #eef6fc;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--sky);
    font-size: 10px;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
    font-weight: bold;
  }
  .copy-btn:hover { background: var(--sky-pale); }
  .copy-btn.copied { background: #eeffee; color: #448855; border-color: #99cc99; }

  .env-badge {
    display: inline-block;
    background: var(--sky-pale);
    border: 1px solid var(--border-dark);
    color: var(--sky);
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: bold;
  }

  /* Comments */
  .comments-section {
    padding: 0 24px 24px;
    background: #f8fcff;
    border-top: 1px solid var(--border);
  }
  .comments-title {
    font-size: 12px;
    color: var(--sky);
    font-weight: bold;
    padding-top: 16px;
    margin-bottom: 12px;
  }
  .comment-item {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, orderBy, query, increment } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAPs7d59vZFkw2RSLUesnudcrZnNhxEdg",
    authDomain: "sharelink-54e34.firebaseapp.com",
    projectId: "sharelink-54e34",
    storageBucket: "sharelink-54e34.firebasestorage.app",
    messagingSenderId: "694782332637",
    appId: "1:694782332637:web:c4bbacb2b0fe34509e1534"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "links");

  let allLinks = [];
  let envFilter = '';
  let currentDetailLink = null;
  let detailCommentUnsub = null;
  let carouselIndex = 0;
  let selectedImageFiles = [];
  let selectedPromptModalTags = new Set(['프롬프트']);

  // 프롬프트 항목만 필터 (tags에 '프롬프트' 포함 + promptText 있음)
  function isPromptItem(l) {
    const tags = Array.isArray(l.tags) ? l.tags : (l.tag ? [l.tag] : []);
    return tags.includes('프롬프트') && (l.promptText || l.promptIntro);
  }

  const q = query(colRef, orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    allLinks = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(isPromptItem);
    document.getElementById('status').style.display = 'none';
    document.getElementById('masonry').style.display = 'block';
    render();
    if (currentDetailLink) {
      const updated = allLinks.find(l => l.id === currentDetailLink.id);
      if (updated) { currentDetailLink = updated; renderDetailStats(); }
    }
  }, (err) => {
    document.getElementById('status').textContent = 'Firebase 연결 실패';
    console.error(err);
  });

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getLikedSet() {
    try { return new Set(JSON.parse(localStorage.getItem('likedLinks') || '[]')); } catch { return new Set(); }
  }
  function setLiked(id, liked) {
    const s = getLikedSet();
    if (liked) s.add(id); else s.delete(id);
    localStorage.setItem('likedLinks', JSON.stringify([...s]));
  }

  function render() {
    renderPinned();
    const searchQ = document.getElementById('searchInput').value.toLowerCase();
    const sortOrder = document.getElementById('sortSelect').value;
    const masonry = document.getElementById('masonry');

    let filtered = [...allLinks].filter(l => {
      const tags = Array.isArray(l.tags) ? l.tags : [];
      const envMatch = !envFilter || tags.includes(envFilter) || (l.promptEnv || '').includes(envFilter);
      const qMatch = !searchQ ||
        (l.title || '').toLowerCase().includes(searchQ) ||
        (l.promptText || '').toLowerCase().includes(searchQ) ||
        (l.promptIntro || '').toLowerCase().includes(searchQ);
      return envMatch && qMatch;
    });

    filtered.sort((a, b) => {
      if (sortOrder === 'asc') return a.createdAt - b.createdAt;
      if (sortOrder === 'likes') return (b.likes || 0) - (a.likes || 0);
      if (sortOrder === 'comments') return (b.commentCount || 0) - (a.commentCount || 0);
      return b.createdAt - a.createdAt;
    });

    if (!filtered.length) {
      masonry.innerHTML = '<div class="empty">✦ 아직 프롬프트가 없어요 ✦<br><br>위의 + 버튼으로 추가해보세요!</div>';
      return;
    }

    masonry.innerHTML = filtered.map((l, i) => {
      const images = (l.images && l.images.length) ? l.images : (l.image ? [l.image] : []);
      const hasImage = images.length > 0;
      const isNew = l.createdAt && (Date.now() - l.createdAt) < 2 * 24 * 60 * 60 * 1000;
      const env = l.promptEnv || (Array.isArray(l.tags) ? l.tags.find(t => ['ComfyUI','NAI','미드저니','NanoBanana','이미지','영상'].includes(t)) : '') || '';

      if (hasImage) {
        return `
          <div class="pcard" style="--i:${i}" onclick="window._openDetail('${l.id}')">
            ${l.pinned ? '<span class="pcard-pin">✦ PICK</span>' : ''}
            ${isNew ? '<span class="pcard-new">NEW</span>' : ''}
            <div class="pcard-img-wrap">
              <img class="pcard-img" src="${escHtml(images[0])}" loading="lazy" alt="">
              ${images.length > 1 ? `<span class="pcard-img-count">${images.length}</span>` : ''}
              <div class="pcard-hover">
                <div class="pcard-hover-title">${escHtml(l.title || '제목 없음')}</div>
                ${env ? `<div class="pcard-hover-env">${escHtml(env)}</div>` : ''}
                <div class="pcard-hover-meta">
                  <span>♥ ${l.likes || 0}</span>
                  <span>👁 ${l.views || 0}</span>
                  <span>💬 ${l.commentCount || 0}</span>
                </div>
              </div>
            </div>
          </div>`;
      }

      // Text-only card (프롬프트만 있고 이미지 없음)
      const preview = l.promptText || l.promptIntro || '';
      return `
        <div class="pcard pcard-text-only" style="--i:${i}" onclick="window._openDetail('${l.id}')">
          ${l.pinned ? '<span class="pcard-pin">✦ PICK</span>' : ''}
          ${isNew ? '<span class="pcard-new">NEW</span>' : ''}
          <div class="pcard-text-title">${escHtml(l.title || '제목 없음')}</div>
          ${env ? `<div class="pcard-text-env">✦ ${escHtml(env)}</div>` : ''}
          <div class="pcard-text-preview">${escHtml(preview)}</div>
          <div class="pcard-text-meta">
            <span>${l.author ? `<span class="author">by ${escHtml(l.author)}</span>` : ''}</span>
            <span>♥ ${l.likes || 0} · 💬 ${l.commentCount || 0}</span>
          </div>
        </div>`;
    }).join('');
  }

  function renderPinned() {
    const ribbon = document.getElementById('pinnedRibbon');
    const scroll = document.getElementById('pinnedScroll');
    const pinned = allLinks
      .filter(l => l.pinned === true)
      .sort((a, b) => (b.pinnedAt || b.createdAt || 0) - (a.pinnedAt || a.createdAt || 0));

    if (!pinned.length) { ribbon.classList.remove('show'); return; }
    ribbon.classList.add('show');
    scroll.innerHTML = pinned.map(l => {
      const images = (l.images && l.images.length) ? l.images : (l.image ? [l.image] : []);
      const thumb = images.length
        ? `<img src="${escHtml(images[0])}" alt="" loading="lazy">`
        : `<div class="pinned-placeholder">✧</div>`;
      return `
        <div class="pinned-item" onclick="window._openDetail('${l.id}')" title="${escHtml(l.title || '')}">
          ${thumb}
          <span class="pin-overlay">✦ PICK</span>
        </div>`;
    }).join('');
  }

  // ========== DETAIL MODAL ==========
  window._openDetail = function(id) {
    const l = allLinks.find(x => x.id === id);
    if (!l) return;
    currentDetailLink = l;
    carouselIndex = 0;

    updateDoc(doc(db, "links", id), { views: increment(1) });

    const images = (l.images && l.images.length) ? l.images : (l.image ? [l.image] : []);
    const hero = document.getElementById('detailHero');
    const thumbs = document.getElementById('carouselThumbs');

    if (images.length > 1) {
      thumbs.style.display = 'flex';
      thumbs.innerHTML = images.map((img, i) => `
        <div class="carousel-thumb ${i === 0 ? 'active' : ''}" onclick="window._goCarousel(${i})">
          <img src="${escHtml(img)}" alt="" loading="lazy">
        </div>`).join('');
      hero.innerHTML = `
        <img class="detail-hero-img" src="${escHtml(images[0])}" alt="">
        <button class="carousel-nav prev" onclick="window._prevCarousel()">&#8249;</button>
        <button class="carousel-nav next" onclick="window._nextCarousel()">&#8250;</button>
      `;
    } else if (images.length === 1) {
      thumbs.style.display = 'none';
      hero.innerHTML = `<img class="detail-hero-img" src="${escHtml(images[0])}" alt="">`;
    } else {
      thumbs.style.display = 'none';
      hero.innerHTML = `<div class="detail-hero-empty">✦ 이미지가 아직 없어요 ✦</div>`;
    }

    const tags = Array.isArray(l.tags) ? l.tags : (l.tag ? [l.tag] : []);
    document.getElementById('detailTags').innerHTML = tags.map(t => `<span class="detail-tag">${escHtml(t)}</span>`).join('');
    document.getElementById('detailTitle').textContent = l.title || '제목 없음';

    const meta = [];
    if (l.author) meta.push(`<span>👤 ${escHtml(l.author)}</span>`);
    if (l.createdAt) meta.push(`<span>📅 ${new Date(l.createdAt).toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'})}</span>`);
    document.getElementById('detailMeta').innerHTML = meta.join('');

    renderDetailStats();

    // 프롬프트 바디 (이미지 바로 아래)
    let bodyHtml = '';
    if (l.promptIntro) {
      bodyHtml += `
        <div class="psection">
          <div class="psection-title">프롬프트 소개</div>
          <div class="psection-content">${escHtml(l.promptIntro)}</div>
        </div>`;
    }
    if (l.promptEnv) {
      bodyHtml += `
        <div class="psection">
          <div class="psection-title">실행환경</div>
          <div><span class="env-badge">${escHtml(l.promptEnv)}</span></div>
        </div>`;
    }
    if (l.promptText) {
      bodyHtml += `
        <div class="psection prompt-main">
          <div class="psection-title">
            <span>✦ 프롬프트</span>
            <button class="copy-btn" id="copyPromptBtn" onclick="window._copyPrompt()">📋 복사하기</button>
          </div>
          <div class="psection-content">${escHtml(l.promptText)}</div>
        </div>`;
    }
    if (l.promptTip) {
      bodyHtml += `
        <div class="psection">
          <div class="psection-title">활용 팁</div>
          <div class="psection-content">${escHtml(l.promptTip)}</div>
        </div>`;
    }
    document.getElementById('detailBody').innerHTML = bodyHtml;

    // 댓글 실시간
    if (detailCommentUnsub) detailCommentUnsub();
    const commentsRef = collection(db, "links", id, "comments");
    const cq = query(commentsRef, orderBy("createdAt", "asc"));
    detailCommentUnsub = onSnapshot(cq, snap => {
      renderComments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });

    document.getElementById('detailBg').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  function renderDetailStats() {
    if (!currentDetailLink) return;
    const l = currentDetailLink;
    const liked = getLikedSet().has(l.id);
    document.getElementById('detailStats').innerHTML = `
      <button class="like-btn ${liked ? 'liked' : ''}" onclick="window._toggleLike()">
        ${liked ? '♥' : '♡'} ${l.likes || 0}
      </button>
      <span class="stat-item">👁 ${l.views || 0}</span>
      <span class="stat-item">💬 ${l.commentCount || 0}</span>
    `;
  }

  window._toggleLike = async function() {
    if (!currentDetailLink) return;
    const id = currentDetailLink.id;
    const liked = getLikedSet().has(id);
    setLiked(id, !liked);
    await updateDoc(doc(db, "links", id), { likes: increment(liked ? -1 : 1) });
  };

  window._copyPrompt = function() {
    if (!currentDetailLink || !currentDetailLink.promptText) return;
    navigator.clipboard.writeText(currentDetailLink.promptText).then(() => {
      const btn = document.getElementById('copyPromptBtn');
      if (btn) {
        btn.textContent = '✓ 복사됨!';
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = '📋 복사하기'; btn.classList.remove('copied'); }, 2000);
      }
    });
  };

  // 캐러셀
  window._goCarousel = function(i) {
    if (!currentDetailLink) return;
    const images = (currentDetailLink.images && currentDetailLink.images.length) ? currentDetailLink.images : [];
    if (i < 0 || i >= images.length) return;
    carouselIndex = i;
    document.querySelector('.detail-hero-img').src = images[i];
    document.querySelectorAll('.carousel-thumb').forEach((t, idx) => {
      t.classList.toggle('active', idx === i);
    });
  };
  window._prevCarousel = function() {
    const images = currentDetailLink?.images || [];
    window._goCarousel((carouselIndex - 1 + images.length) % images.length);
  };
  window._nextCarousel = function() {
    const images = currentDetailLink?.images || [];
    window._goCarousel((carouselIndex + 1) % images.length);
  };

  function renderComments(comments) {
    const list = document.getElementById('commentsList');
    if (!comments.length) {
      list.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-size:12px;padding:8px 0">첫 댓글을 남겨보세요!</div>';
      return;
    }
    list.innerHTML = comments.map(c => `
      <div class="comment-item">
        <div class="comment-avatar">${(c.author || '?')[0].toUpperCase()}</div>
        <div class="comment-content">
          <div class="comment-author">${escHtml(c.author || '익명')}</div>
          <div class="comment-text">${escHtml(c.text)}</div>
          <div class="comment-date">${c.createdAt ? new Date(c.createdAt).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''}</div>
        </div>
      </div>`).join('');
  }

  window.submitComment = async function() {
    if (!currentDetailLink) return;
    const author = document.getElementById('commentAuthor').value.trim() || '익명';
    const text = document.getElementById('commentText').value.trim();
    if (!text) return;
    const commentsRef = collection(db, "links", currentDetailLink.id, "comments");
    try {
      await addDoc(commentsRef, { author, text, createdAt: Date.now() });
      await updateDoc(doc(db, "links", currentDetailLink.id), { commentCount: increment(1) });
      document.getElementById('commentText').value = '';
    } catch(e) { alert('등록 실패: ' + e.message); }
  };

  window.closeDetail = function() {
    document.getElementById('detailBg').classList.remove('open');
    document.body.style.overflow = '';
    if (detailCommentUnsub) { detailCommentUnsub(); detailCommentUnsub = null; }
    currentDetailLink = null;
  };

  document.getElementById('detailBg').addEventListener('click', e => {
    if (e.target === document.getElementById('detailBg')) window.closeDetail();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('detailBg').classList.contains('open')) window.closeDetail();
      else if (document.getElementById('promptModalBg').classList.contains('open')) window.closePromptModal();
    }
    if (document.getElementById('detailBg').classList.contains('open')) {
      if (e.key === 'ArrowLeft') window._prevCarousel();
      if (e.key === 'ArrowRight') window._nextCarousel();
    }
  });

  // 검색 / 필터
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('sortSelect').addEventListener('change', render);
  document.querySelectorAll('.env-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.env-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      envFilter = btn.dataset.env;
      render();
    });
  });

  // ========== 프롬프트 추가 모달 ==========
  window.openPromptModal = function() {
    selectedPromptModalTags = new Set(['프롬프트']);
    selectedImageFiles = [];
    ['pTitleInput','pAuthorInput','pPromptIntroInput','pPromptEnvInput','pPromptTextInput','pPromptTipInput'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('pPinnedInput').checked = false;
    document.getElementById('uploadPreview').innerHTML = '';
    document.querySelectorAll('#promptModalTagsContainer .modal-tag').forEach(b => {
      b.classList.toggle('selected', selectedPromptModalTags.has(b.dataset.tag));
    });
    document.getElementById('promptModalBg').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closePromptModal = function() {
    document.getElementById('promptModalBg').classList.remove('open');
    document.body.style.overflow = '';
  };

  document.getElementById('promptModalBg').addEventListener('click', e => {
    if (e.target === document.getElementById('promptModalBg')) window.closePromptModal();
  });

  document.querySelectorAll('#promptModalTagsContainer .modal-tag').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tag === '프롬프트') return;
      if (selectedPromptModalTags.has(btn.dataset.tag)) {
        selectedPromptModalTags.delete(btn.dataset.tag);
        btn.classList.remove('selected');
      } else {
        selectedPromptModalTags.add(btn.dataset.tag);
        btn.classList.add('selected');
      }
    });
  });

  window.handleImageSelect = function(e) {
    selectedImageFiles = [...selectedImageFiles, ...[...e.target.files]];
    e.target.value = '';
    renderUploadPreview();
  };

  function renderUploadPreview() {
    const preview = document.getElementById('uploadPreview');
    if (!selectedImageFiles.length) { preview.innerHTML = ''; return; }
    preview.innerHTML = selectedImageFiles.map((f, i) => `
      <div class="upload-thumb">
        <img src="${URL.createObjectURL(f)}" alt="">
        <button onclick="window._removeImage(${i})">✕</button>
      </div>`).join('');
  }

  window._removeImage = function(i) {
    selectedImageFiles.splice(i, 1);
    renderUploadPreview();
  };

  window.savePrompt = async function() {
    const title = document.getElementById('pTitleInput').value.trim();
    if (!title) { alert('제목을 입력해주세요'); return; }

    const btn = document.getElementById('pSaveBtn');
    btn.disabled = true;
    btn.textContent = selectedImageFiles.length > 0 ? '업로드 중...' : '저장 중...';

    try {
      const imageUrls = [];
      for (const file of selectedImageFiles) {
        const dataUrl = await new Promise((resolve, reject) => {
          const img = new Image();
          const reader = new FileReader();
          reader.onload = e => {
            img.onload = () => {
              const MAX = 600;
              let w = img.width, h = img.height;
              if (w > MAX || h > MAX) {
                if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                else { w = Math.round(w * MAX / h); h = MAX; }
              }
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', 0.65));
            };
            img.onerror = () => reject(new Error(`"${file.name}" 이미지를 읽을 수 없습니다`));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error(`"${file.name}" 파일 읽기 실패`));
          reader.readAsDataURL(file);
        });
        if (dataUrl.length > 250 * 1024) {
          throw new Error(`이미지가 너무 큽니다 (${Math.round(dataUrl.length/1024)}KB)`);
        }
        imageUrls.push(dataUrl);
      }
      const totalSize = imageUrls.reduce((sum, u) => sum + u.length, 0);
      if (totalSize > 700 * 1024) {
        throw new Error(`이미지 총 용량이 너무 큽니다 (${Math.round(totalSize/1024)}KB)`);
      }

      const tags = [...selectedPromptModalTags];
      const pinned = document.getElementById('pPinnedInput').checked;
      const docData = {
        title,
        author: document.getElementById('pAuthorInput').value.trim(),
        tags,
        images: imageUrls,
        promptIntro: document.getElementById('pPromptIntroInput').value.trim(),
        promptEnv: document.getElementById('pPromptEnvInput').value.trim(),
        promptText: document.getElementById('pPromptTextInput').value.trim(),
        promptTip: document.getElementById('pPromptTipInput').value.trim(),
        createdAt: Date.now(),
        views: 0,
        likes: 0,
        commentCount: 0,
        pinned
      };
      if (pinned) docData.pinnedAt = Date.now();
      await addDoc(colRef, docData);
      window.closePromptModal();
    } catch(e) {
      alert('저장 실패: ' + e.message);
    }

    btn.disabled = false;
    btn.textContent = '저장';
  };

</script>
</body>
</html>
